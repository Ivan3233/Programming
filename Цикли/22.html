<html>
<head>
	<title>22</title>
</head>

<body>
	<h2> Програма для визначення найменшої кількості доданків виду 1^2 + 2^2 + З^2 + ... , сума яких перевищує задане число z </h2>
	<div id="field"></div>
		<script>
			let field = document.getElementById("field");
			let z = parseInt(prompt("Задайте число z:"));	
			let sum=0;	
			let count=0;
			for (let i=1;sum<=z;i++) {
				let square = i*i;
					sum = sum + square;
					count = count+1;
					field.innerHTML += square + " ";
			}
			field.innerHTML += "<p> Сума квадратів: " + sum + "</p>";
			field.innerHTML += "<p> Кількість доданків: " + count + "</p>";
		</script>
</body>
</html>
